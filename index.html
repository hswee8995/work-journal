<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무일지</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efeb;
    --text: #1a1a18; --text2: #6b6a64; --text3: #a09f99;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --blue-bg: #E6F1FB; --blue-text: #0C447C; --blue-border: #85B7EB;
    --teal-bg: #E1F5EE; --teal-text: #085041; --teal-border: #5DCAA5;
    --amber-bg: #FAEEDA; --amber-text: #633806; --amber-border: #EF9F27;
    --purple-bg: #EEEDFE; --purple-text: #3C3489; --purple-border: #AFA9EC;
    --green-bg: #EAF3DE; --green-text: #27500A; --green-border: #97C459;
    --red-bg: #FCEBEB; --red-text: #791F1F; --red-border: #F09595;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #e8e6de; --text2: #9c9a92; --text3: #6b6a64;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --blue-bg: #042C53; --blue-text: #B5D4F4;
      --teal-bg: #04342C; --teal-text: #9FE1CB;
      --amber-bg: #412402; --amber-text: #FAC775;
      --purple-bg: #26215C; --purple-text: #CECBF6;
      --green-bg: #173404; --green-text: #C0DD97;
      --red-bg: #501313; --red-text: #F7C1C1;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
  .login-wrap { max-width: 400px; margin: 80px auto; padding: 0 16px; }
  .login-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 32px 28px; }
  .login-title { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .role-btn { padding: 14px 10px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--bg2); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); font-family: inherit; text-align: center; }
  .role-btn.selected { border-color: #185FA5; color: #185FA5; background: var(--blue-bg); }
  .role-icon { font-size: 22px; display: block; margin-bottom: 6px; }
  .login-field { margin-bottom: 14px; }
  .login-field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
  .login-field input { width: 100%; font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; outline: none; }
  .login-err { font-size: 12px; color: var(--red-text); background: var(--red-bg); border: 0.5px solid var(--red-border); border-radius: var(--radius); padding: 8px 12px; margin-bottom: 12px; display: none; }
  .login-btn { width: 100%; padding: 11px; border-radius: var(--radius); border: none; background: #185FA5; color: #E6F1FB; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .login-btn:hover { background: #0C447C; }
  .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .app-header-left { display: flex; align-items: center; gap: 10px; }
  .app-title { font-size: 15px; font-weight: 500; }
  .app-role { font-size: 12px; color: var(--text2); background: var(--bg2); border: 0.5px solid var(--border); border-radius: 99px; padding: 3px 10px; }
  .logout-btn { font-size: 12px; color: var(--text3); cursor: pointer; background: none; border: none; font-family: inherit; padding: 4px 8px; border-radius: var(--radius); }
  .logout-btn:hover { color: var(--text2); background: var(--bg2); }
  .tab-nav { display: flex; gap: 4px; margin-bottom: 16px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 5px; }
  .tab-btn { flex: 1; padding: 8px; border-radius: var(--radius); border: none; background: transparent; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); font-family: inherit; }
  .tab-btn.active { background: var(--bg3); color: var(--text); }
  .tab-page { display: none; } .tab-page.active { display: block; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
  .b-blue { background: var(--blue-bg); color: var(--blue-text); }
  .b-amber { background: var(--amber-bg); color: var(--amber-text); }
  .b-teal { background: var(--teal-bg); color: var(--teal-text); }
  .b-purple { background: var(--purple-bg); color: var(--purple-text); }
  .b-green { background: var(--green-bg); color: var(--green-text); }
  .b-red { background: var(--red-bg); color: var(--red-text); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--text2); }
  input[type=text], input[type=date], select, textarea { width: 100%; font-family: inherit; font-size: 13px; color: var(--text); background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px 10px; outline: none; }
  textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
  .task-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .task-table th { background: var(--bg2); color: var(--text2); font-weight: 500; font-size: 12px; padding: 6px 10px; text-align: left; border-bottom: 0.5px solid var(--border); }
  .task-table td { padding: 5px 6px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table input, .task-table select { background: transparent; border: none; border-radius: 0; padding: 3px 4px; }
  .task-table input:focus, .task-table select:focus { background: var(--bg2); border-radius: 4px; }
  .add-row { font-size: 12px; color: var(--text3); cursor: pointer; padding: 6px 10px; display: inline-block; }
  .add-row:hover { color: var(--text2); }
  .fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mood-row { display: flex; gap: 8px; margin-top: 6px; }
  .mood-btn { padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); font-family: inherit; }
  .mood-btn.on { background: var(--teal-bg); color: var(--teal-text); border-color: var(--teal-border); }
  .btn { padding: 8px 20px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; color: var(--text); }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: #185FA5; color: #E6F1FB; border-color: #185FA5; }
  .btn-primary:hover { background: #0C447C; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-row { display: flex; justify-content: flex-end; margin-top: 16px; }
  .toast { display: none; padding: 10px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; }
  .toast.success { background: var(--green-bg); color: var(--green-text); border: 0.5px solid var(--green-border); }
  .toast.error { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-border); }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 10px 14px; }
  .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .admin-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .jcard { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
  .jcard-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; cursor: pointer; background: var(--bg2); }
  .jcard-head:hover { background: var(--bg3); }
  .jcard-body { display: none; padding: 16px; }
  .jcard-body.open { display: block; }
  .sec-label { font-size: 12px; font-weight: 500; color: var(--text3); margin: 12px 0 6px; display: flex; align-items: center; gap: 6px; }
  .sec-label:first-child { margin-top: 0; }
  .vt { width: 100%; border-collapse: collapse; font-size: 13px; }
  .vt th { font-weight: 500; font-size: 12px; color: var(--text2); padding: 5px 8px; text-align: left; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
  .vt td { padding: 6px 8px; border-bottom: 0.5px solid var(--border); }
  .vt tr:last-child td { border-bottom: none; }
  .fb-view { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
  .fb-item span { font-size: 12px; color: var(--text3); display: block; margin-bottom: 3px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--blue-bg); color: var(--blue-text); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .name-row { display: flex; align-items: center; gap: 8px; }
  .chev { transition: transform 0.2s; }
  .chev.open { transform: rotate(180deg); }
  .loading { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }
  .empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 13px; }
  /* 채팅 */
  .chat-wrap { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; height: 620px; }
  .chat-header { padding: 12px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg2); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .chat-header-title { font-size: 14px; font-weight: 500; }
  .chat-filter { display: flex; align-items: center; gap: 8px; }
  .chat-filter label { font-size: 12px; color: var(--text2); }
  .chat-filter select { width: auto; font-size: 12px; padding: 4px 8px; }
  .chat-refresh { font-size: 12px; color: var(--text3); cursor: pointer; background: none; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 4px 10px; font-family: inherit; }
  .chat-refresh:hover { background: var(--bg2); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
  .msg-row { display: flex; flex-direction: column; gap: 3px; }
  .msg-row.mine { align-items: flex-end; }
  .msg-row.other { align-items: flex-start; }
  .msg-meta { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .msg-bubble { max-width: 68%; padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg-row.mine .msg-bubble { background: #185FA5; color: #E6F1FB; border-bottom-right-radius: 4px; }
  .msg-row.other .msg-bubble { background: var(--bg2); color: var(--text); border-bottom-left-radius: 4px; border: 0.5px solid var(--border); }
  .msg-tag { font-size: 11px; font-weight: 500; padding: 1px 7px; border-radius: 99px; background: var(--amber-bg); color: var(--amber-text); }
  .msg-time { font-size: 11px; color: var(--text3); margin-top: 2px; }
  /* 이미지/파일 첨부 */
  .msg-img { max-width: 240px; max-height: 200px; border-radius: 8px; display: block; margin-top: 6px; cursor: pointer; border: 0.5px solid var(--border); }
  .msg-file { display: inline-flex; align-items: center; gap: 8px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px 12px; margin-top: 6px; text-decoration: none; color: var(--text); font-size: 12px; max-width: 240px; }
  .msg-file:hover { background: var(--bg2); }
  .file-icon { font-size: 18px; flex-shrink: 0; }
  .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-input-area { border-top: 0.5px solid var(--border); padding: 10px 14px; flex-shrink: 0; background: var(--bg); }
  .chat-tag-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .chat-tag-row label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .tag-chip { font-size: 12px; padding: 3px 10px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; cursor: pointer; font-family: inherit; color: var(--text2); }
  .tag-chip.on { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
  .new-tag-input { width: 110px; font-size: 12px; padding: 3px 8px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--bg2); color: var(--text); font-family: inherit; outline: none; }
  .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .chat-input-row textarea { flex: 1; min-height: 40px; max-height: 100px; resize: none; padding: 9px 12px; font-size: 13px; line-height: 1.5; border-radius: var(--radius); }
  .attach-btn { padding: 9px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; font-size: 18px; cursor: pointer; flex-shrink: 0; color: var(--text2); line-height: 1; }
  .attach-btn:hover { background: var(--bg2); }
  .send-btn { padding: 9px 18px; border-radius: var(--radius); border: none; background: #185FA5; color: #E6F1FB; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; flex-shrink: 0; white-space: nowrap; }
  .send-btn:hover { background: #0C447C; }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .attach-preview { display: none; align-items: center; gap: 8px; padding: 6px 10px; background: var(--bg2); border-radius: var(--radius); margin-bottom: 8px; font-size: 12px; color: var(--text2); }
  .attach-preview.show { display: flex; }
  .attach-preview-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attach-remove { cursor: pointer; color: var(--text3); font-size: 16px; flex-shrink: 0; background: none; border: none; font-family: inherit; }
  .attach-remove:hover { color: var(--red-text); }
  .upload-progress { font-size: 12px; color: var(--text2); padding: 4px 0; display: none; }
  .chat-empty { text-align: center; color: var(--text3); font-size: 13px; padding: 2rem; }
  /* 이미지 라이트박스 */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; cursor: pointer; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  @media (max-width: 520px) {
    .field-row { grid-template-columns: 1fr; }
    .fb-grid { grid-template-columns: 1fr; }
    .fb-view { grid-template-columns: 1fr; }
    .msg-bubble { max-width: 85%; }
  }
</style>
</head>
<body>

<!-- 이미지 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<!-- 로그인 -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-title">업무일지</div>
    <div class="login-sub">역할을 선택하고 접속해주세요</div>
    <div class="role-grid">
      <button class="role-btn" id="role-staff" onclick="selectRole('staff')"><span class="role-icon">✏️</span>직원</button>
      <button class="role-btn" id="role-admin" onclick="selectRole('admin')"><span class="role-icon">📋</span>관리자</button>
    </div>
    <div class="login-field" id="field-name">
      <label>이름</label>
      <input type="text" id="login-name" placeholder="이름을 입력해주세요" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field" id="field-pw" style="display:none">
      <label>관리자 비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호를 입력해주세요" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="doLogin()">접속하기</button>
  </div>
</div>

<!-- 앱 -->
<div id="app-screen" style="display:none">
  <div class="wrap">
    <div class="app-header">
      <div class="app-header-left">
        <div class="app-title">업무일지</div>
        <div class="app-role" id="app-role-badge"></div>
      </div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
    <div class="tab-nav">
      <button class="tab-btn active" id="tbtn-journal" onclick="switchTab('journal',this)">업무일지</button>
      <button class="tab-btn" id="tbtn-chat" onclick="switchTab('chat',this)">메시지</button>
    </div>

    <!-- 업무일지 탭 -->
    <div id="tab-journal" class="tab-page active">
      <div id="page-staff" style="display:none">
        <div id="toast-staff" class="toast"></div>
        <div class="card">
          <div class="card-title">기본 정보</div>
          <div class="field-row">
            <div class="field"><label>작성자 이름</label><input type="text" id="s-name" readonly style="opacity:0.7;cursor:default"></div>
            <div class="field"><label>날짜</label><input type="date" id="s-date"></div>
          </div>
          <div class="field"><label>담당 클라이언트</label><input type="text" id="s-client" placeholder="예) (주)한국산업"></div>
        </div>
        <div class="card">
          <div class="card-title"><span class="badge b-blue">1</span> 오늘 완료한 일</div>
          <table class="task-table"><thead><tr><th style="width:42%">업무 내용</th><th>세부 처리 결과</th><th style="width:72px">상태</th></tr></thead><tbody id="done-body"></tbody></table>
          <span class="add-row" onclick="addRow('done-body','done')">+ 행 추가</span>
        </div>
        <div class="card">
          <div class="card-title"><span class="badge b-amber">2</span> 발생한 이슈 &amp; 해결 방안</div>
          <table class="task-table"><thead><tr><th style="width:42%">이슈 내용</th><th>해결 방안 / 현재 상태</th><th style="width:72px">처리</th></tr></thead><tbody id="issue-body"></tbody></table>
          <span class="add-row" onclick="addRow('issue-body','issue')">+ 행 추가</span>
        </div>
        <div class="card">
          <div class="card-title"><span class="badge b-teal">3</span> 내일 할 일</div>
          <table class="task-table"><thead><tr><th style="width:42%">예정 업무</th><th>참고 사항</th><th style="width:72px">우선순위</th></tr></thead><tbody id="todo-body"></tbody></table>
          <span class="add-row" onclick="addRow('todo-body','todo')">+ 행 추가</span>
        </div>
        <div class="card">
          <div class="card-title"><span class="badge b-purple">4</span> 스스로에 대한 피드백</div>
          <div class="fb-grid">
            <div class="field"><label>잘한 점</label><textarea id="fb-good" placeholder="예) 마감 전 오류 사전 발견"></textarea></div>
            <div class="field"><label>개선할 점</label><textarea id="fb-improve" placeholder="예) 이슈 보고 타이밍 개선 필요"></textarea></div>
            <div class="field"><label>내일 집중할 목표</label><textarea id="fb-goal" placeholder="예) 오전 중 전표 입력 완료"></textarea></div>
            <div class="field">
              <label>오늘 업무 만족도</label>
              <div class="mood-row">
                <button class="mood-btn" onclick="setMood(this,'좋음')">😊 좋음</button>
                <button class="mood-btn" onclick="setMood(this,'보통')">😐 보통</button>
                <button class="mood-btn" onclick="setMood(this,'힘듦')">😔 힘듦</button>
              </div>
            </div>
          </div>
        </div>
        <div class="submit-row">
          <button class="btn btn-primary" id="submit-btn" onclick="submitJournal()">업무일지 제출</button>
        </div>
      </div>

      <div id="page-admin" style="display:none">
        <div id="toast-admin" class="toast"></div>
        <div class="admin-meta">
          <input type="date" id="admin-date" style="width:160px;" oninput="loadAdmin()">
          <button class="btn" onclick="clearDate()">전체 보기</button>
        </div>
        <div class="stat-grid">

// ── 로그인 ──
function selectRole(role) {
  currentRole = role;

function switchTabDirect(name) {

// ── 업무일지 ──
function initStaffForm() {
  ['done-body','issue-body','todo-body'].forEach(id => document.getElementById(id).innerHTML = '');
  addRow('done-body','done'); addRow('issue-body','issue'); addRow('todo-body','todo');
  ['fb-good','fb-improve','fb-goal'].forEach(id => document.getElementById(id).value = '');
  mood = ''; document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('on'));
}

function setMood(btn, val) {
  mood = val;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function addRow(tbodyId, type) {
  const tbody = document.getElementById(tbodyId);
  const tr = document.createElement('tr');
  if (type === 'done') tr.innerHTML = `<td><input type="text" placeholder="업무명"></td><td><input type="text" placeholder="처리 결과"></td><td><select><option>완료</option><option>진행중</option></select></td>`;
  else if (type === 'issue') tr.innerHTML = `<td><input type="text" placeholder="이슈 내용"></td><td><input type="text" placeholder="해결 방안"></td><td><select><option>해결</option><option>진행중</option><option>미해결</option></select></td>`;
  else tr.innerHTML = `<td><input type="text" placeholder="예정 업무"></td><td><input type="text" placeholder="참고 사항"></td><td><select><option>높음</option><option>보통</option><option>낮음</option></select></td>`;
  tbody.appendChild(tr);
}

function getRows(tbodyId) {
  const rows = [];
  document.querySelectorAll('#' + tbodyId + ' tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input, select');
    if (inputs[0] && inputs[0].value.trim()) rows.push({ a: inputs[0].value, b: inputs[1] ? inputs[1].value : '', c: inputs[2] ? inputs[2].value : '' });
  });
  return rows;
}

function showToast(id, msg, type) {
  const t = document.getElementById(id);
  t.textContent = msg; t.className = 'toast ' + (type || 'success'); t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

async function submitJournal() {
  const date = document.getElementById('s-date').value;
  if (!date) { showToast('toast-staff', '날짜를 입력해주세요.', 'error'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '제출 중...';
  const { error } = await db.from('journals').insert({
    name: currentName, date, client: document.getElementById('s-client').value.trim(),
    done: getRows('done-body'), issues: getRows('issue-body'), todos: getRows('todo-body'),
    feedback: { good: document.getElementById('fb-good').value, improve: document.getElementById('fb-improve').value, goal: document.getElementById('fb-goal').value, mood }
  });
  btn.disabled = false; btn.textContent = '업무일지 제출';
  if (error) { showToast('toast-staff', '저장 오류: ' + error.message, 'error'); return; }
  showToast('toast-staff', '업무일지가 제출되었습니다.');
  initStaffForm();
  document.getElementById('s-date').value = today();
  document.getElementById('s-client').value = '';
}

function today() { return new Date().toISOString().slice(0, 10); }

async function loadAdmin() {
  const filterDate = document.getElementById('admin-date').value;
  const list = document.getElementById('admin-list');
  list.innerHTML = '<div class="loading">불러오는 중...</div>';
  let query = db.from('journals').select('*').order('date', { ascending: false }).order('created_at', { ascending: false });
  if (filterDate) query = query.eq('date', filterDate);
  const { data, error } = await query;
  if (error) { list.innerHTML = '<div class="empty">불러오지 못했습니다.</div>'; return; }
  const todayStr = today();
  document.getElementById('st-total').textContent = data.length;
  document.getElementById('st-issues').textContent = data.reduce((acc, j) => acc + (j.issues || []).filter(i => i.c === '진행중' || i.c === '미해결').length, 0);

    const init = j.name ? j.name.slice(0, 2) : '??';
    const mi = moodMap[j.feedback && j.feedback.mood] || '';
    const dr = (j.done || []).map(r => `<tr><td>${r.a}</td><td>${r.b}</td><td><span class="badge b-green">${r.c}</span></td></tr>`).join('');

    const tr2 = (j.todos || []).map(r => `<tr><td>${r.a}</td><td>${r.b}</td><td><span class="badge b-blue">${r.c}</span></td></tr>`).join('');
    const fb = j.feedback || {};
    return `<div class="jcard"><div class="jcard-head" onclick="toggleCard(${i})"><div class="name-row"><div class="avatar">${init}</div><span style="font-weight:500">${j.name}</span>${j.client?`<span style="font-size:12px;color:var(--text3)">· ${j.client}</span>`:''} ${mi?`<span style="font-size:15px">${mi}</span>`:''}</div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:12px;color:var(--text3)">${j.date}</span><svg class="chev" id="chev-${i}" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div><div class="jcard-body" id="body-${i}">${dr?`<div class="sec-label"><span class="badge b-blue">1</span> 완료한 일</div><table class="vt"><thead><tr><th>업무</th><th>결과</th><th style="width:70px">상태</th></tr></thead><tbody>${dr}</tbody></table>`:''}${ir?`<div class="sec-label"><span class="badge b-amber">2</span> 이슈</div><table class="vt"><thead><tr><th>이슈</th><th>해결 방안</th><th style="width:70px">처리</th></tr></thead><tbody>${ir}</tbody></table>`:''}${tr2?`<div class="sec-label"><span class="badge b-teal">3</span> 내일 할 일</div><table class="vt"><thead><tr><th>예정 업무</th><th>참고</th><th style="width:70px">우선순위</th></tr></thead><tbody>${tr2}</tbody></table>`:''}<div class="sec-label"><span class="badge b-purple">4</span> 피드백</div><div class="fb-view"><div class="fb-item"><span>잘한 점</span>${fb.good||'—'}</div><div class="fb-item"><span>개선할 점</span>${fb.improve||'—'}</div><div class="fb-item"><span>내일 목표</span>${fb.goal||'—'}</div><div class="fb-item"><span>만족도</span>${fb.mood||'—'}</div></div></div></div>`;
  }).join('');
}

function toggleCard(i) {
  document.getElementById('body-' + i).classList.toggle('open');
  document.getElementById('chev-' + i).classList.toggle('open');
}

function clearDate() { document.getElementById('admin-date').value = ''; loadAdmin(); }

// ── 파일 첨부 ──
function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { alert('파일 크기는 10MB 이하만 가능합니다.'); input.value = ''; return; }
  pendingFile = file;
  const icon = file.type.startsWith('image/') ? '🖼️' : file.type === 'application/pdf' ? '📄' : '📎';
  document.getElementById('attach-preview-icon').textContent = icon;
  document.getElementById('attach-preview-name').textContent = file.name;
  document.getElementById('attach-preview').classList.add('show');
  input.value = '';
}

function removeAttach() {
  pendingFile = null;
  document.getElementById('attach-preview').classList.remove('show');
}

async function uploadFile(file) {
  const ext = file.name.split(".").pop();
  const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const uploadUrl = `${SUPA_URL}/storage/v1/object/attachments/${path}`;
  const res = await fetch(uploadUrl, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${SUPA_KEY}`,
      "Content-Type": file.type,
      "x-upsert": "false"
    },
    body: file
  });
  if (!res.ok) {
    const errText = await res.text();
    console.error("Upload error:", errText);
    throw new Error("파일 업로드 실패: " + errText);
  }
  const publicUrl = `${SUPA_URL}/storage/v1/object/public/attachments/${path}`;
  return { url: publicUrl, name: file.name, type: file.type };
}

// ── 메시지 ──
async function loadMessages() {
  try {
    const { data, error } = await db.from('messages').select('*').order('created_at', { ascending: true });
    if (error) return;
    allMessages = data || [];
    updateTagOptions();
    const chatActive = document.getElementById('tab-chat').classList.contains('active');
    if (chatActive) { renderMessages(); scrollChat(); }
  } catch(e) {}
}

function updateTagOptions() {
  const tags = [...new Set(allMessages.filter(m => m.client_tag).map(m => m.client_tag))];
  const sel = document.getElementById('chat-filter-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체</option>' + tags.map(t => `<option value="${t}">${t}</option>`).join('');
  if (cur) sel.value = cur;
  const chips = document.getElementById('tag-chips');
  let html = tags.map(t => `<button class="tag-chip${selectedTag===t?' on':''}" onclick="toggleTag('${t}',this)">${t}</button>`).join('');
  html += `<button class="tag-chip${selectedTag==='__new__'?' on':''}" onclick="toggleTag('__new__',this)">+ 새 거래처</button>`;
  if (selectedTag === '__new__') html += `<input class="new-tag-input" id="new-tag-input" type="text" placeholder="거래처명 입력">`;
  chips.innerHTML = html;
}

function toggleTag(val, btn) {
  selectedTag = selectedTag === val ? '' : val;
  updateTagOptions();
}

function renderMessages() {
  const filter = document.getElementById('chat-filter-select').value;
  const msgs = filter ? allMessages.filter(m => m.client_tag === filter) : allMessages;
  const container = document.getElementById('chat-messages');
  if (!msgs.length) { container.innerHTML = '<div class="chat-empty">아직 메시지가 없습니다</div>'; return; }
  let html = '', lastDate = '';
  msgs.forEach(m => {
    const d = new Date(m.created_at);
    const dateStr = d.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
    if (dateStr !== lastDate) {
      html += `<div style="text-align:center;font-size:11px;color:var(--text3);margin:4px 0 8px">${dateStr}</div>`;
      lastDate = dateStr;
    }
    const isMine = m.sender === currentName;
    const timeStr = d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    const tagHtml = m.client_tag ? `<span class="msg-tag">${m.client_tag}</span>` : '';
    const roleBadge = m.role === 'admin' ? `<span class="badge b-blue" style="font-size:10px">관리자</span>` : '';

    let attachHtml = '';
    if (m.file_url && m.file_type && m.file_type.startsWith('image/')) {
      attachHtml = `<img class="msg-img" src="${m.file_url}" alt="${escHtml(m.file_name||'이미지')}" onclick="openLightbox('${m.file_url}')">`;
    } else if (m.file_url) {
      const ficon = m.file_type === 'application/pdf' ? '📄' : '📎';
      attachHtml = `<a class="msg-file" href="${m.file_url}" target="_blank" rel="noopener"><span class="file-icon">${ficon}</span><span class="file-name">${escHtml(m.file_name||'파일')}</span></a>`;
    }

    const bubbleContent = (m.content ? escHtml(m.content) : '') + attachHtml;

    if (isMine) {
      html += `<div class="msg-row mine"><div class="msg-meta">${tagHtml}</div><div class="msg-bubble">${bubbleContent}</div><div class="msg-time">${timeStr}</div></div>`;
    } else {
      html += `<div class="msg-row other"><div class="msg-meta">${roleBadge}<strong style="font-size:12px">${escHtml(m.sender)}</strong>${tagHtml}</div><div class="msg-bubble">${bubbleContent}</div><div class="msg-time">${timeStr}</div></div>`;
    }
  });
  container.innerHTML = html;
}

function scrollChat() {
  const c = document.getElementById('chat-messages');
  setTimeout(() => { c.scrollTop = c.scrollHeight; }, 50);
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content && !pendingFile) return;

  let tag = '';
  if (selectedTag && selectedTag !== '__new__') tag = selectedTag;
  else if (selectedTag === '__new__') { const ni = document.getElementById('new-tag-input'); tag = ni ? ni.value.trim() : ''; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  let fileData = {};
  if (pendingFile) {
    document.getElementById('upload-progress').style.display = 'block';
    try {
      const result = await uploadFile(pendingFile);
      fileData = { file_url: result.url, file_name: result.name, file_type: result.type };
    } catch(e) {
      alert('파일 업로드 오류: ' + e.message);
      document.getElementById('upload-progress').style.display = 'none';
      btn.disabled = false;
      return;
    }
    document.getElementById('upload-progress').style.display = 'none';
  }

  try {
    const { error } = await db.from('messages').insert({
      sender: currentName, role: currentRole,
      content: content || null,
      client_tag: tag || null,
      ...fileData
    });
    if (!error) {
      input.value = ''; input.style.height = 'auto';
      pendingFile = null;
      document.getElementById('attach-preview').classList.remove('show');
      selectedTag = '';
      await loadMessages();
      scrollChat();
    } else { alert('전송 오류: ' + error.message); }
  } catch(e) { alert('전송 중 오류가 발생했습니다.'); }
  btn.disabled = false;
}

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('show');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightbox-img').src = '';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
