<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무일지</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efeb;
    --text: #1a1a18; --text2: #6b6a64; --text3: #a09f99;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --blue-bg: #E6F1FB; --blue-text: #0C447C; --blue-border: #85B7EB;
    --teal-bg: #E1F5EE; --teal-text: #085041; --teal-border: #5DCAA5;
    --amber-bg: #FAEEDA; --amber-text: #633806; --amber-border: #EF9F27;
    --purple-bg: #EEEDFE; --purple-text: #3C3489; --purple-border: #AFA9EC;
    --green-bg: #EAF3DE; --green-text: #27500A; --green-border: #97C459;
    --red-bg: #FCEBEB; --red-text: #791F1F; --red-border: #F09595;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #e8e6de; --text2: #9c9a92; --text3: #6b6a64;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --blue-bg: #042C53; --blue-text: #B5D4F4;
      --teal-bg: #04342C; --teal-text: #9FE1CB;
      --amber-bg: #412402; --amber-text: #FAC775;
      --purple-bg: #26215C; --purple-text: #CECBF6;
      --green-bg: #173404; --green-text: #C0DD97;
      --red-bg: #501313; --red-text: #F7C1C1;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; }
  .wrap { max-width: 780px; margin: 0 auto; padding: 24px 16px; }
  .top-nav { display: flex; gap: 8px; margin-bottom: 20px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 6px; }
  .nav-btn { flex: 1; padding: 8px; border-radius: var(--radius); border: none; background: transparent; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); transition: all 0.15s; }
  .nav-btn.active { background: var(--bg3); color: var(--text); }
  .page { display: none; } .page.active { display: block; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
  .b-blue { background: var(--blue-bg); color: var(--blue-text); }
  .b-amber { background: var(--amber-bg); color: var(--amber-text); }
  .b-teal { background: var(--teal-bg); color: var(--teal-text); }
  .b-purple { background: var(--purple-bg); color: var(--purple-text); }
  .b-green { background: var(--green-bg); color: var(--green-text); }
  .b-red { background: var(--red-bg); color: var(--red-text); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--text2); }
  input, select, textarea { width: 100%; font-family: inherit; font-size: 13px; color: var(--text); background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px 10px; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--border2); }
  textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
  .task-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .task-table th { background: var(--bg2); color: var(--text2); font-weight: 500; font-size: 12px; padding: 6px 10px; text-align: left; border-bottom: 0.5px solid var(--border); }
  .task-table td { padding: 5px 6px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table input, .task-table select { background: transparent; border: none; border-radius: 0; padding: 3px 4px; }
  .task-table input:focus, .task-table select:focus { background: var(--bg2); border-radius: 4px; }
  .add-row { font-size: 12px; color: var(--text3); cursor: pointer; padding: 6px 10px; display: inline-block; }
  .add-row:hover { color: var(--text2); }
  .fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mood-row { display: flex; gap: 8px; margin-top: 6px; }
  .mood-btn { padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); font-family: inherit; transition: all 0.15s; }
  .mood-btn.on { background: var(--teal-bg); color: var(--teal-text); border-color: var(--teal-border); }
  .btn { padding: 8px 20px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; color: var(--text); transition: all 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: #185FA5; color: #E6F1FB; border-color: #185FA5; }
  .btn-primary:hover { background: #0C447C; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-row { display: flex; justify-content: flex-end; margin-top: 16px; }
  .toast { display: none; padding: 10px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; }
  .toast.success { background: var(--green-bg); color: var(--green-text); border: 0.5px solid var(--green-border); }
  .toast.error { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-border); }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 10px 14px; }
  .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .admin-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .jcard { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
  .jcard-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; cursor: pointer; background: var(--bg2); transition: background 0.15s; }
  .jcard-head:hover { background: var(--bg3); }
  .jcard-body { display: none; padding: 16px; }
  .jcard-body.open { display: block; }
  .sec-label { font-size: 12px; font-weight: 500; color: var(--text3); margin: 12px 0 6px; display: flex; align-items: center; gap: 6px; }
  .sec-label:first-child { margin-top: 0; }
  .vt { width: 100%; border-collapse: collapse; font-size: 13px; }
  .vt th { font-weight: 500; font-size: 12px; color: var(--text2); padding: 5px 8px; text-align: left; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
  .vt td { padding: 6px 8px; border-bottom: 0.5px solid var(--border); }
  .vt tr:last-child td { border-bottom: none; }
  .fb-view { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
  .fb-item span { font-size: 12px; color: var(--text3); display: block; margin-bottom: 3px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--blue-bg); color: var(--blue-text); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .name-row { display: flex; align-items: center; gap: 8px; }
  .chev { transition: transform 0.2s; }
  .chev.open { transform: rotate(180deg); }
  .loading { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }
  .empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 13px; }
  .feedback-box { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; min-height: 54px; font-size: 13px; color: var(--text3); font-style: italic; border: 0.5px solid var(--border); }
  @media (max-width: 520px) {
    .field-row { grid-template-columns: 1fr; }
    .fb-grid { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: repeat(3, 1fr); }
    .fb-view { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-nav">
    <button class="nav-btn active" onclick="switchPage('staff', this)">직원 — 업무일지 작성</button>
    <button class="nav-btn" onclick="switchPage('admin', this)">관리자 — 보고 확인</button>
  </div>

  <!-- 직원 페이지 -->
  <div id="page-staff" class="page active">
    <div id="toast-staff" class="toast"></div>
    <div class="card">
      <div class="card-title">기본 정보</div>
      <div class="field-row">
        <div class="field"><label>작성자 이름</label><input type="text" id="s-name" placeholder="예) 김민준"></div>
        <div class="field"><label>날짜</label><input type="date" id="s-date"></div>
      </div>
      <div class="field"><label>담당 클라이언트</label><input type="text" id="s-client" placeholder="예) (주)한국산업"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="badge b-blue">1</span> 오늘 완료한 일</div>
      <table class="task-table">
        <thead><tr><th style="width:42%">업무 내용</th><th>세부 처리 결과</th><th style="width:72px">상태</th></tr></thead>
        <tbody id="done-body"></tbody>
      </table>
      <span class="add-row" onclick="addRow('done-body','done')">+ 행 추가</span>
    </div>

    <div class="card">
      <div class="card-title"><span class="badge b-amber">2</span> 발생한 이슈 &amp; 해결 방안</div>
      <table class="task-table">
        <thead><tr><th style="width:42%">이슈 내용</th><th>해결 방안 / 현재 상태</th><th style="width:72px">처리</th></tr></thead>
        <tbody id="issue-body"></tbody>
      </table>
      <span class="add-row" onclick="addRow('issue-body','issue')">+ 행 추가</span>
    </div>

    <div class="card">
      <div class="card-title"><span class="badge b-teal">3</span> 내일 할 일</div>
      <table class="task-table">
        <thead><tr><th style="width:42%">예정 업무</th><th>참고 사항</th><th style="width:72px">우선순위</th></tr></thead>
        <tbody id="todo-body"></tbody>
      </table>
      <span class="add-row" onclick="addRow('todo-body','todo')">+ 행 추가</span>
    </div>

    <div class="card">
      <div class="card-title"><span class="badge b-purple">4</span> 스스로에 대한 피드백</div>
      <div class="fb-grid">
        <div class="field"><label>잘한 점</label><textarea id="fb-good" placeholder="예) 마감 전 오류 사전 발견"></textarea></div>
        <div class="field"><label>개선할 점</label><textarea id="fb-improve" placeholder="예) 이슈 보고 타이밍 개선 필요"></textarea></div>
        <div class="field"><label>내일 집중할 목표</label><textarea id="fb-goal" placeholder="예) 오전 중 전표 입력 완료"></textarea></div>
        <div class="field">
          <label>오늘 업무 만족도</label>
          <div class="mood-row">
            <button class="mood-btn" onclick="setMood(this,'좋음')">😊 좋음</button>
            <button class="mood-btn" onclick="setMood(this,'보통')">😐 보통</button>
            <button class="mood-btn" onclick="setMood(this,'힘듦')">😔 힘듦</button>
          </div>
        </div>
      </div>
    </div>
    <div class="submit-row">
      <button class="btn btn-primary" id="submit-btn" onclick="submitJournal()">업무일지 제출</button>
    </div>
  </div>

  <!-- 관리자 페이지 -->
  <div id="page-admin" class="page">
    <div id="toast-admin" class="toast"></div>
    <div class="admin-meta">
      <input type="date" id="admin-date" style="width:160px;" oninput="loadAdmin()">
      <button class="btn" onclick="clearDate()">전체 보기</button>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">조회된 일지</div><div class="stat-val" id="st-total">—</div></div>
      <div class="stat"><div class="stat-label">진행중 이슈</div><div class="stat-val" id="st-issues">—</div></div>
      <div class="stat"><div class="stat-label">오늘 제출</div><div class="stat-val" id="st-today">—</div></div>
    </div>
    <div id="admin-list"><div class="loading">날짜를 선택하거나 전체 보기를 눌러주세요</div></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://fehrtmzekpkjbaxfnxuv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlaHJ0bXpla3BramJheGZueHV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjAzOTMsImV4cCI6MjA5MDczNjM5M30.Shm8jaIU3KNSG41_wd_d_PttQ3Zx4J8jlnPGrz3MnkE';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

let mood = '';

function switchPage(p, btn) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  btn.classList.add('active');
  if (p === 'admin') loadAdmin();
}

function setMood(btn, val) {
  mood = val;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function addRow(tbodyId, type) {
  const tbody = document.getElementById(tbodyId);
  const tr = document.createElement('tr');
  if (type === 'done') {
    tr.innerHTML = `<td><input type="text" placeholder="업무명"></td><td><input type="text" placeholder="처리 결과"></td><td><select><option>완료</option><option>진행중</option></select></td>`;
  } else if (type === 'issue') {
    tr.innerHTML = `<td><input type="text" placeholder="이슈 내용"></td><td><input type="text" placeholder="해결 방안"></td><td><select><option>해결</option><option>진행중</option><option>미해결</option></select></td>`;
  } else {
    tr.innerHTML = `<td><input type="text" placeholder="예정 업무"></td><td><input type="text" placeholder="참고 사항"></td><td><select><option>높음</option><option>보통</option><option>낮음</option></select></td>`;
  }
  tbody.appendChild(tr);
}

function getRows(tbodyId) {
  const rows = [];
  document.querySelectorAll('#' + tbodyId + ' tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input, select');
    if (inputs[0] && inputs[0].value.trim()) {
      rows.push({ a: inputs[0].value, b: inputs[1] ? inputs[1].value : '', c: inputs[2] ? inputs[2].value : '' });
    }
  });
  return rows;
}

function showToast(id, msg, type = 'success') {
  const t = document.getElementById(id);
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

async function submitJournal() {
  const name = document.getElementById('s-name').value.trim();
  const date = document.getElementById('s-date').value;
  const client = document.getElementById('s-client').value.trim();
  if (!name || !date) { showToast('toast-staff', '이름과 날짜를 입력해주세요.', 'error'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '제출 중...';
  const { error } = await db.from('journals').insert({
    name, date, client,
    done: getRows('done-body'),
    issues: getRows('issue-body'),
    todos: getRows('todo-body'),
    feedback: {
      good: document.getElementById('fb-good').value,
      improve: document.getElementById('fb-improve').value,
      goal: document.getElementById('fb-goal').value,
      mood
    }
  });
  btn.disabled = false;
  btn.textContent = '업무일지 제출';
  if (error) { showToast('toast-staff', '저장 중 오류가 발생했습니다: ' + error.message, 'error'); return; }
  showToast('toast-staff', '업무일지가 성공적으로 제출되었습니다.');
  resetForm();
}

function resetForm() {
  ['s-name', 's-client', 'fb-good', 'fb-improve', 'fb-goal'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('s-date').value = today();
  mood = '';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('on'));
  ['done-body', 'issue-body', 'todo-body'].forEach(id => {
    document.getElementById(id).innerHTML = '';
  });
  addRow('done-body', 'done');
  addRow('issue-body', 'issue');
  addRow('todo-body', 'todo');
}

function today() { return new Date().toISOString().slice(0, 10); }

async function loadAdmin() {
  const filterDate = document.getElementById('admin-date').value;
  const list = document.getElementById('admin-list');
  list.innerHTML = '<div class="loading">불러오는 중...</div>';

  let query = db.from('journals').select('*').order('date', { ascending: false }).order('created_at', { ascending: false });
  if (filterDate) query = query.eq('date', filterDate);
  const { data, error } = await query;

  if (error) { list.innerHTML = '<div class="empty">데이터를 불러오지 못했습니다.</div>'; return; }

  const todayStr = today();
  const todayCount = data.filter(j => j.date === todayStr).length;
  const issueCount = data.reduce((acc, j) => acc + (j.issues || []).filter(i => i.c === '진행중' || i.c === '미해결').length, 0);

  document.getElementById('st-total').textContent = data.length;
  document.getElementById('st-issues').textContent = issueCount;
  document.getElementById('st-today').textContent = todayCount;

  if (data.length === 0) { list.innerHTML = '<div class="empty">해당 날짜에 제출된 업무일지가 없습니다.</div>'; return; }

  const moodMap = { '좋음': '😊', '보통': '😐', '힘듦': '😔' };
  list.innerHTML = data.map((j, i) => {
    const initials = j.name ? j.name.slice(0, 2) : '??';
    const mood = moodMap[j.feedback?.mood] || '';
    const doneRows = (j.done || []).map(r => `<tr><td>${r.a}</td><td>${r.b}</td><td><span class="badge b-green">${r.c}</span></td></tr>`).join('');
    const issueRows = (j.issues || []).map(r => `<tr><td>${r.a}</td><td>${r.b}</td><td><span class="badge ${r.c === '해결' ? 'b-green' : r.c === '진행중' ? 'b-amber' : 'b-red'}">${r.c}</span></td></tr>`).join('');
    const todoRows = (j.todos || []).map(r => `<tr><td>${r.a}</td><td>${r.b}</td><td><span class="badge b-blue">${r.c}</span></td></tr>`).join('');
    const fb = j.feedback || {};
    return `<div class="jcard">
      <div class="jcard-head" onclick="toggleCard(${i})">
        <div class="name-row">
          <div class="avatar">${initials}</div>
          <span style="font-weight:500">${j.name}</span>
          ${j.client ? `<span style="font-size:12px;color:var(--text3)">· ${j.client}</span>` : ''}
          ${mood ? `<span style="font-size:15px">${mood}</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;color:var(--text3)">${j.date}</span>
          <svg class="chev" id="chev-${i}" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="jcard-body" id="body-${i}">
        ${doneRows ? `<div class="sec-label"><span class="badge b-blue">1</span> 완료한 일</div><table class="vt"><thead><tr><th>업무</th><th>결과</th><th style="width:70px">상태</th></tr></thead><tbody>${doneRows}</tbody></table>` : ''}
        ${issueRows ? `<div class="sec-label"><span class="badge b-amber">2</span> 이슈</div><table class="vt"><thead><tr><th>이슈</th><th>해결 방안</th><th style="width:70px">처리</th></tr></thead><tbody>${issueRows}</tbody></table>` : ''}
        ${todoRows ? `<div class="sec-label"><span class="badge b-teal">3</span> 내일 할 일</div><table class="vt"><thead><tr><th>예정 업무</th><th>참고</th><th style="width:70px">우선순위</th></tr></thead><tbody>${todoRows}</tbody></table>` : ''}
        <div class="sec-label"><span class="badge b-purple">4</span> 피드백</div>
        <div class="fb-view">
          <div class="fb-item"><span>잘한 점</span>${fb.good || '—'}</div>
          <div class="fb-item"><span>개선할 점</span>${fb.improve || '—'}</div>
          <div class="fb-item"><span>내일 목표</span>${fb.goal || '—'}</div>
          <div class="fb-item"><span>만족도</span>${fb.mood || '—'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(i) {
  document.getElementById('body-' + i).classList.toggle('open');
  document.getElementById('chev-' + i).classList.toggle('open');
}

function clearDate() {
  document.getElementById('admin-date').value = '';
  loadAdmin();
}

// 초기화
document.getElementById('s-date').value = today();
document.getElementById('admin-date').value = today();
addRow('done-body', 'done');
addRow('issue-body', 'issue');
addRow('todo-body', 'todo');
</script>
